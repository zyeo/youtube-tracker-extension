<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-container">
      <h1 class="popup-title">YouTube Tracker</h1>
      <p class="popup-text">YouTube opens today</p>
      <div id="openCount" class="popup-count">0</div>

      <p class="popup-text popup-divider">Active YouTube time today</p>
      <div id="activeTime" class="popup-count popup-count-time">00:00</div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
