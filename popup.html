<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>YouTube Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="popup-container">
      <h1 class="popup-title">YouTube Tracker</h1>
      <section class="popup-main-metric">
        <p class="popup-text">YouTube time today</p>
        <div id="focusedTime" class="popup-total-time popup-count-time">00:00</div>
        <div id="timeComparison" class="popup-comparison">No change vs yesterday</div>

        <div class="popup-submetrics">
          <div class="popup-submetric-row">
            <span class="popup-submetric-label">Shorts time</span>
            <span id="shortsTime" class="popup-submetric-value popup-count-time">00:00</span>
          </div>
          <div class="popup-submetric-row">
            <span class="popup-submetric-label">Watch time</span>
            <span id="watchTime" class="popup-submetric-value popup-count-time">00:00</span>
          </div>
          <div class="popup-submetric-row">
            <span class="popup-submetric-label">Browse time</span>
            <span id="browseTime" class="popup-submetric-value popup-count-time">00:00</span>
          </div>
        </div>
      </section>

      <section class="popup-lower-section">
        <p class="popup-text">YouTube opens today</p>
        <div id="openCount" class="popup-count">0</div>
        <div id="opensComparison" class="popup-comparison">No change vs yesterday</div>
      </section>

      <button id="openDashboard" class="popup-button">Open dashboard</button>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
